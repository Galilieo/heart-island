<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>心屿 Heart Island</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <header class="hero">
    <p class="badge">Heart Island</p>
    <h1>每一种情绪，都值得被温柔接住</h1>
    <p class="intro">面向大学生的匿名情绪漂流瓶原型：表达、被回应、再连接。</p>
  </header>

  <main class="layout">
    <section class="card" id="compose">
      <h2>1. 投递情绪漂流瓶</h2>
      <p>先选你此刻的状态，再写下想说的话。</p>

      <div class="emotion-grid" id="emotionGrid" role="radiogroup" aria-label="选择情绪">
        <button type="button" class="emotion-chip" data-emotion="焦虑">焦虑</button>
        <button type="button" class="emotion-chip" data-emotion="迷茫">迷茫</button>
        <button type="button" class="emotion-chip" data-emotion="疲惫">疲惫</button>
        <button type="button" class="emotion-chip" data-emotion="平静">平静</button>
        <button type="button" class="emotion-chip" data-emotion="开心">开心</button>
        <button type="button" class="emotion-chip" data-emotion="失落">失落</button>
      </div>

      <label for="message">匿名内容</label>
      <textarea id="message" rows="5" placeholder="可以写今天发生了什么，也可以只写一句感受。"></textarea>
      <button type="button" class="primary" id="submitBottle">匿名投递</button>
      <p id="submitHint" class="hint" aria-live="polite"></p>
    </section>

    <section class="card" id="aiReplyCard">
      <h2>2. AI 温和回应</h2>
      <p class="reply" id="aiReply">你投递后，这里会出现回应。</p>
    </section>

    <section class="card" id="resonance">
      <h2>3. 共鸣互动</h2>
      <p>看看其他人的漂流瓶，点亮“我也有同感”。</p>
      <ul class="bottle-list" id="bottleList"></ul>
    </section>

    <section class="card" id="records">
      <h2>4. 我的记录</h2>
      <div id="stats" class="stats"></div>
      <ul class="timeline" id="timeline"></ul>
    </section>
  </main>
</body>
</html>
